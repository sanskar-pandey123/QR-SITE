<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Payment Mode</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #001f3f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
      text-align: center;
    }

    .payment-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .payment-option {
      background-color: #003366;
      padding: 20px 30px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease, background-color 0.3s ease;
      min-width: 200px;
      text-align: center;
      font-size: 18px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .payment-option:hover {
      background-color: #005599;
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .payment-option {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Select Your Payment Method</h1>
  <div class="payment-container">
    <div class="payment-option" onclick="openQR()">Pay via QR Code</div>
    <div class="payment-option">Pay using PhonePe</div>
    <div class="payment-option">Pay via UPI ID</div>
    <div class="payment-option">Debit / Credit Card</div>
  </div>

  <script>
    function openQR() {
      window.location.href = "scanner.html"; // This will open your QR page
    }
  </script>
</body>
</html>
